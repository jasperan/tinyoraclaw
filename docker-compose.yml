services:
  # ─────────────────────────────────────────────────────────
  # Oracle AI Database 26ai Free (local container)
  # ─────────────────────────────────────────────────────────
  oracle-db:
    image: container-registry.oracle.com/database/free:latest-lite
    container_name: tinyoraclaw-oracle
    profiles: ["oracle", "default"]
    environment:
      - ORACLE_PWD=${ORACLE_PASSWORD:-TinyOraClaw2026}
      - ORACLE_CHARACTERSET=AL32UTF8
    ports:
      - "1521:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test:
        [
          "CMD",
          "sqlplus",
          "-L",
          "sys/${ORACLE_PASSWORD:-TinyOraClaw2026}@//localhost:1521/FREEPDB1 as sysdba",
          "@/dev/null",
        ]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 120s
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────
  # TinyOraClaw sidecar – FreePDB mode (local container)
  # Usage: docker compose up oracle-db tinyoraclaw-service
  # ─────────────────────────────────────────────────────────
  tinyoraclaw-service:
    build:
      context: ./tinyoraclaw-service
      dockerfile: Dockerfile
    container_name: tinyoraclaw-service
    profiles: ["freepdb", "default"]
    ports:
      - "${TINYORACLAW_SERVICE_PORT:-8100}:8100"
    environment:
      - ORACLE_MODE=freepdb
      - ORACLE_USER=${ORACLE_USER:-tinyoraclaw}
      - ORACLE_PASSWORD=${ORACLE_PASSWORD:-TinyOraClaw2026}
      - ORACLE_HOST=oracle-db
      - ORACLE_PORT=1521
      - ORACLE_SERVICE=FREEPDB1
      - TINYORACLAW_SERVICE_PORT=8100
      - TINYORACLAW_SERVICE_TOKEN=${TINYORACLAW_SERVICE_TOKEN:-}
      - AUTO_INIT=true
    depends_on:
      oracle-db:
        condition: service_healthy
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────
  # TinyOraClaw sidecar – ADB cloud mode (wallet-less TLS)
  # Usage: docker compose --profile adb up tinyoraclaw-service-adb
  #
  # Set in .env:
  #   ORACLE_USER=ADMIN
  #   ORACLE_PASSWORD=Welcome12345*
  #   ORACLE_DSN=(description= (retry_count=20)...)
  # ─────────────────────────────────────────────────────────
  tinyoraclaw-service-adb:
    build:
      context: ./tinyoraclaw-service
      dockerfile: Dockerfile
    container_name: tinyoraclaw-service-adb
    profiles: ["adb"]
    ports:
      - "${TINYORACLAW_SERVICE_PORT:-8100}:8100"
    environment:
      - ORACLE_MODE=adb
      - ORACLE_USER=${ORACLE_USER:-ADMIN}
      - ORACLE_PASSWORD=${ORACLE_PASSWORD}
      - ORACLE_DSN=${ORACLE_DSN}
      - ORACLE_WALLET_PATH=${ORACLE_WALLET_PATH:-}
      - ORACLE_WALLET_PASSWORD=${ORACLE_WALLET_PASSWORD:-}
      - ORACLE_POOL_MIN=${ORACLE_POOL_MIN:-2}
      - ORACLE_POOL_MAX=${ORACLE_POOL_MAX:-10}
      - TINYORACLAW_SERVICE_PORT=8100
      - TINYORACLAW_SERVICE_TOKEN=${TINYORACLAW_SERVICE_TOKEN:-}
      - AUTO_INIT=true
    restart: unless-stopped

volumes:
  oracle-data:
